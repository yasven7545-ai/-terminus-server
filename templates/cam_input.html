<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ sheet_name }} | Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0b0e14; font-family: 'Inter', sans-serif; }
        .table-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 100%;
            padding: 4px 8px;
            border-radius: 4px;
            outline: none;
            transition: all 0.2s;
        }
        .table-input:focus { border-color: #3b82f6; background: #1e293b; }
        .readonly-total { 
            background: transparent !important; 
            border: none !important; 
            color: #60a5fa !important; 
            font-weight: bold; 
            text-align: right;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: #111827; color: #94a3b8; padding: 12px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid #1f2937; }
        td { padding: 6px; border-bottom: 1px solid #1f2937; }
        tr:hover td { background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="text-slate-300 p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <button onclick="window.location.href='/my_dashboard'" class="flex items-center text-blue-500 hover:text-blue-400 font-bold transition mb-2">
                    <i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i> Back to Dashboard
                </button>
                <h1 class="text-3xl font-bold text-white uppercase">{{ sheet_name }}</h1>
                <p class="text-slate-500 text-sm">Editing live Excel actuals</p>
            </div>

            <button onclick="saveChanges()" id="saveBtn" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg shadow-blue-900/20">
                <i data-lucide="save" class="w-5 h-5"></i> Save to Excel
            </button>
        </div>

        <div class="bg-[#111827] rounded-2xl border border-gray-800 shadow-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <form id="editForm">
                    {{ table_html | safe }}
                </form>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        document.addEventListener('DOMContentLoaded', () => {
            const table = document.querySelector('table');
            const headers = Array.from(table.querySelectorAll('th')).map(th => th.innerText.toLowerCase());
            const rows = table.querySelectorAll('tbody tr');

            // Find key columns for math
            const totalColIdx = headers.findIndex(h => h.includes('total') || h.includes('costing'));

            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                cells.forEach((cell, idx) => {
                    const val = cell.innerText.trim();
                    
                    // Column logic
                    if (idx === 0 || val.toLowerCase() === 'total') {
                        // Keep ID or Labels as simple text
                        cell.innerHTML = `<input type="text" class="table-input border-none bg-transparent" value="${val}" readonly>`;
                    } else if (idx === totalColIdx) {
                        // Make total columns calculated/readonly
                        cell.innerHTML = `<input type="text" class="table-input readonly-total" value="${val}" readonly>`;
                    } else {
                        // Everything else is an editable number
                        cell.innerHTML = `<input type="text" class="table-input" value="${val}" oninput="runCalculations()">`;
                    }
                });
            });
        });

        function runCalculations() {
            const table = document.querySelector('table');
            const headers = Array.from(table.querySelectorAll('th')).map(th => th.innerText.toLowerCase());
            const rows = Array.from(table.querySelectorAll('tbody tr'));
            
            // Logic for Sheets like Manpower (Total = A + B + C...)
            const totalIdx = headers.findIndex(h => h.includes('total') || h.includes('costing'));
            
            let grandTotal = 0;

            rows.forEach((row, index) => {
                if (row.innerText.toLowerCase().includes('total')) return; // Skip footer

                const inputs = row.querySelectorAll('input');
                let rowSum = 0;
                
                // If the sheet has "Cost per person" and "Total People"
                // This is a generic sum of all numbers in the row excluding the last one
                inputs.forEach((input, i) => {
                    if (i > 1 && i < totalIdx) {
                        rowSum += parseFloat(input.value) || 0;
                    }
                });

                // Update Row Total
                if (totalIdx !== -1) {
                    const totalInput = inputs[totalIdx];
                    // Example: If it's Manpower, Total Cost = (People Sum) * (Cost per person)
                    // You can add specific sheet logic here
                    grandTotal += parseFloat(totalInput.value) || 0;
                }
            });

            // Update the Grand Total row if it exists
            const footerRow = rows.find(r => r.innerText.toLowerCase().includes('total'));
            if (footerRow && totalIdx !== -1) {
                const totalCells = Array.from(table.querySelectorAll(`tbody tr td:nth-child(${totalIdx + 1}) input`));
                let sum = 0;
                totalCells.forEach((input, idx) => {
                    if (idx < totalCells.length - 1) sum += parseFloat(input.value.replace(/,/g,'')) || 0;
                });
                footerRow.querySelector(`td:nth-child(${totalIdx + 1}) input`).value = sum.toLocaleString('en-IN');
            }
        }

        async function saveChanges() {
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = "Saving...";
            btn.disabled = true;

            const rows = Array.from(document.querySelectorAll('table tbody tr'));
            const data = rows.map(row => {
                return Array.from(row.querySelectorAll('input')).map(input => input.value);
            });

            try {
                const response = await fetch('/update_excel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sheet_name: "{{ sheet_name }}",
                        data: data
                    })
                });

                if (response.ok) {
                    alert("Success: Excel updated!");
                    window.location.reload();
                } else {
                    alert("Error saving data.");
                }
            } catch (err) {
                alert("Server Connection Error.");
            } finally {
                btn.innerHTML = `<i data-lucide="save" class="w-5 h-5"></i> Save to Excel`;
                btn.disabled = false;
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
