<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{ error_code }} - ONEWEST</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .error-container {
            text-align: center;
            padding: 40px;
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #333;
        }
        h1 { color: #cf6679; font-size: 4rem; margin: 0; }
        h2 { color: #e0e0e0; margin: 10px 0; }
        p { color: #a0a0a0; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 24px;
            background: #00bcd4;
            color: #000;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
        }
        .btn:hover { background: #0097a7; }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>{{ error_code }}</h1>
        <h2>
            {% if error_code == 404 %}
                Page Not Found
            {% elif error_code == 403 %}
                Access Denied
            {% elif error_code == 500 %}
                Server Error
            {% else %}
                Error
            {% endif %}
        </h2>
        <p>The requested resource could not be found or an error occurred.</p>
        <a href="/onewest" class="btn">← Back to ONEWEST Portal</a>
    </div>
</body>
</html>
